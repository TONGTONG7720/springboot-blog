# ==============================
# Spring Boot 配置文件
# ==============================

server:
  port: 8080

spring:
  # ====== MySQL 数据库配置 ======
  datasource:
    url: jdbc:mysql://localhost:3306/blog_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA
  jpa:
    hibernate:
      ddl-auto: update  # 自动建表（开发用，生产改成 none）
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ====== Redis 缓存 ======
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  cache:
    type: redis
    redis:
      time-to-live: 1800000

# JWT 配置
jwt:
  secret: MySuperSecretKeyForBlogProjectMustBeAtLeast256BitsLong!!
  expiration: 86400000

# 日志
logging:
  level:
    com.example.blog: DEBUG
    org.hibernate.SQL: DEBUG
